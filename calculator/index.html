<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>

  <body>
    <!-- Theme Toggle Button -->
    <button
      class="btn btn-outline-secondary theme-toggle-btn"
      id="theme-toggle"
      onclick="toggleTheme()"
      title="Toggle dark/light mode"
    >
      🌙
    </button>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-6 col-md-6 col-sm-8">
          <div class="border border-dotted border-3 rounded-3 p-3 mb-4 bg-white bg-opacity-50">
            <h4 class="text-center group-header mb-0">VUNA CALCULATOR</h4>
            <p class="text-center text-small text-muted">
              <i>Created by set 2025/26 Software Engineering</i>
            </p>
          </div>
          <div class="row">
            <div class="col-md-12">
              <div class="card calculator-card">
                <div class="card-body p-4">
                  <div class="calculator">
                    <div class="display-container">
                      <input
                        type="text"
                        class="form-control"
                        id="result"
                        placeholder="0"
                        disabled
                      />
                    </div>

                    <div class="btn-grid">
                      <button class="btn btn-light" onclick="bracketToResult('(')">(</button>
                      <button class="btn btn-light" onclick="bracketToResult(')')">)</button>
                      <button class="btn btn-light" onclick="backspace()">←</button>

                      <!-- Row trig -->
                      <button class="btn btn-action" onclick="clearResult()">AC</button>

                      <!-- Row 2 -->
                      <button class="btn btn-light" onclick="appendToResult(7)">7</button>
                      <button class="btn btn-light" onclick="appendToResult(8)">8</button>
                      <button class="btn btn-light" onclick="appendToResult(9)">9</button>

                      <!-- Row 3 -->
                      <button class="btn btn-operator" onclick="operatorToResult('/')">÷</button>
                      <button class="btn btn-light" onclick="appendToResult(4)">4</button>
                      <button class="btn btn-light" onclick="appendToResult(5)">5</button>
                      <button class="btn btn-light" onclick="appendToResult(6)">6</button>

                      <!-- Row 4 -->
                      <button class="btn btn-operator" onclick="operatorToResult('*')">×</button>
                      <button class="btn btn-light" onclick="appendToResult(1)">1</button>
                      <button class="btn btn-light" onclick="appendToResult(2)">2</button>
                      <button class="btn btn-light" onclick="appendToResult(3)">3</button>

                      <!-- Row 5 -->
                      <button class="btn btn-operator" onclick="operatorToResult('+')">+</button>
                      <button class="btn btn-light" onclick="appendToResult('.')">.</button>
                      <button class="btn btn-light" onclick="appendToResult(0)">0</button>
                      <button class="btn btn-operator" onclick="percentToResult('%')">%</button>

                      <!-- Row 9 -->
                      <button class="btn btn-operator" onclick="operatorToResult('-')">−</button>

                      <button
                        class="btn btn-equals"
                        onclick="calculateResult()"
                        style="grid-column: span 4"
                      >
                        =
                      </button>
                    </div>

                    <div class="brain-score-card" id="brain-score-display">
                      <div class="brain-level">🌱 Novice</div>
                      <div class="brain-score-val">Score: 0</div>
                      <div class="brain-progress"><div class="brain-progress-fill" style="width:0%"></div></div>
                      <div class="brain-calc-count">Calculations: 0</div>
                    </div>
                    <button class="btn btn-outline-primary w-100 mt-3" onclick="toggleMatrixPanel()">
                      🧮 Matrix Mode
                    </button>
                    <div id="matrix-panel" class="matrix-panel mt-3" style="display:none">
                      <h6 class="text-center fw-bold mb-3">Matrix Operations</h6>
                      <div class="row">
                        <div class="col-6">
                          <label class="small-label">Matrix A</label>
                          <div class="d-flex gap-1 mb-2">
                            <select id="A-rows" class="form-select form-select-sm" onchange="resizeMatrix('A')" style="width:auto">
                              <option value="1">1</option><option value="2" selected>2</option><option value="3">3</option><option value="4">4</option>
                            </select>
                            <span class="mx-1">×</span>
                            <select id="A-cols" class="form-select form-select-sm" onchange="resizeMatrix('A')" style="width:auto">
                              <option value="1">1</option><option value="2" selected>2</option><option value="3">3</option><option value="4">4</option>
                            </select>
                          </div>
                          <div id="matrix-a-inputs"></div>
                        </div>
                        <div class="col-6">
                          <label class="small-label">Matrix B</label>
                          <div class="d-flex gap-1 mb-2">
                            <select id="B-rows" class="form-select form-select-sm" onchange="resizeMatrix('B')" style="width:auto">
                              <option value="1">1</option><option value="2" selected>2</option><option value="3">3</option><option value="4">4</option>
                            </select>
                            <span class="mx-1">×</span>
                            <select id="B-cols" class="form-select form-select-sm" onchange="resizeMatrix('B')" style="width:auto">
                              <option value="1">1</option><option value="2" selected>2</option><option value="3">3</option><option value="4">4</option>
                            </select>
                          </div>
                          <div id="matrix-b-inputs"></div>
                        </div>
                      </div>
                      <div class="d-flex flex-wrap gap-1 justify-content-center mt-3">
                        <button class="btn btn-sm btn-operator" onclick="matrixOperation('add')">A+B</button>
                        <button class="btn btn-sm btn-operator" onclick="matrixOperation('sub')">A−B</button>
                        <button class="btn btn-sm btn-operator" onclick="matrixOperation('mul')">A×B</button>
                        <button class="btn btn-sm btn-outline-info" onclick="matrixOperation('detA')">det(A)</button>
                        <button class="btn btn-sm btn-outline-info" onclick="matrixOperation('detB')">det(B)</button>
                        <button class="btn btn-sm btn-outline-success" onclick="matrixOperation('trA')">Aᵀ</button>
                        <button class="btn btn-sm btn-outline-success" onclick="matrixOperation('trB')">Bᵀ</button>
                        <button class="btn btn-sm btn-outline-warning" onclick="matrixOperation('invA')">A⁻¹</button>
                        <button class="btn btn-sm btn-outline-warning" onclick="matrixOperation('invB')">B⁻¹</button>
                      </div>
                      <div class="matrix-result-box mt-3 p-2">
                        <label class="small-label">Result</label>
                        <div id="matrix-result-display"><span class="text-muted">—</span></div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <script src="assets/js/bootstrap.min.js"></script>
            <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
            <script src="assets/js/script.js"></script>
            <button id="scroll-to-calculator" title="Back to Calculator">↑</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
